apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pfe-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Moatazbench/PFE.git
    targetRevision: develop
    path: k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: pfe-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true