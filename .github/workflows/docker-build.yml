name: Docker Build and Push

on:
  push:
    branches:
      - main
      - develop

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            moatazbench/pfe-backend:latest
            moatazbench/pfe-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            moatazbench/pfe-frontend:latest
            moatazbench/pfe-frontend:${{ github.sha }}

      - name: Jira comment (success)
        if: success()
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_MSG: "${{ github.event.head_commit.message }} | CI SUCCESS on ${{ github.ref_name }} @ ${{ github.sha }}"
        run: |
          bash .github/scripts/jira-comment.sh "$JIRA_MSG"

      - name: Jira comment (failure)
        if: failure()
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_MSG: "${{ github.event.head_commit.message }} | CI FAILED on ${{ github.ref_name }} @ ${{ github.sha }}"
        run: |
          bash .github/scripts/jira-comment.sh "$JIRA_MSG"