name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - qa
      - staging
  pull_request:

jobs:

  # =========================
  # 1️⃣ Backend Tests
  # =========================
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Run backend tests
        run: |
          cd backend
          npm test


  # =========================
  # 2️⃣ Frontend Build Test
  # =========================
  frontend-build:
    runs-on: ubuntu-latest
    needs: backend-tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build


  # =========================
  # 3️⃣ Docker Build + Scan + Push
  # =========================
  docker:
    runs-on: ubuntu-latest
    needs: frontend-build

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # =========================
      # Set Environment Tag
      # =========================
      - name: Set Image Tag
        id: vars
        run: |
          if [[ "$GITHUB_REF_NAME" == "main" ]]; then
            echo "TAG=latest" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF_NAME" == "develop" ]]; then
            echo "TAG=dev-latest" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF_NAME" == "qa" ]]; then
            echo "TAG=qa-latest" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF_NAME" == "staging" ]]; then
            echo "TAG=staging-latest" >> $GITHUB_OUTPUT
          fi

      # =========================
      # Build Backend Image
      # =========================
      - name: Build Backend Image
        run: |
          docker build -t moatazbench/pfe-backend:${{ steps.vars.outputs.TAG }} ./backend
          docker tag moatazbench/pfe-backend:${{ steps.vars.outputs.TAG }} moatazbench/pfe-backend:${{ github.sha }}

      # =========================
      # Build Frontend Image
      # =========================
      - name: Build Frontend Image
        run: |
          docker build -t moatazbench/pfe-frontend:${{ steps.vars.outputs.TAG }} ./frontend
          docker tag moatazbench/pfe-frontend:${{ steps.vars.outputs.TAG }} moatazbench/pfe-frontend:${{ github.sha }}

      # =========================
      # 4️⃣ Trivy Security Scan (Enterprise)
      # =========================
      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: moatazbench/pfe-backend:${{ steps.vars.outputs.TAG }}
          format: table
          exit-code: 0
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: moatazbench/pfe-frontend:${{ steps.vars.outputs.TAG }}
          format: table
          exit-code: 0
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # =========================
      # Push Images (Only on Push)
      # =========================
      - name: Push Images
        if: github.event_name == 'push'
        run: |
          docker push moatazbench/pfe-backend:${{ steps.vars.outputs.TAG }}
          docker push moatazbench/pfe-backend:${{ github.sha }}

          docker push moatazbench/pfe-frontend:${{ steps.vars.outputs.TAG }}
          docker push moatazbench/pfe-frontend:${{ github.sha }}