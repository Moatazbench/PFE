name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - qa
      - staging
  pull_request:

jobs:

  # =========================
  # 1️⃣ Backend Tests
  # =========================
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Run backend tests
        run: |
          cd backend
          npm test

  # =========================
  # 2️⃣ Frontend Build Test
  # =========================
  frontend-build:
    runs-on: ubuntu-latest
    needs: backend-tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  # =========================
  # 3️⃣ Docker Build + Scan
  # =========================
  docker:
    runs-on: ubuntu-latest
    needs: frontend-build

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Image Tag
        id: vars
        run: |
          if [[ "$GITHUB_REF_NAME" == "main" ]]; then
            echo "TAG=latest" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF_NAME" == "develop" ]]; then
            echo "TAG=dev-latest" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF_NAME" == "qa" ]]; then
            echo "TAG=qa-latest" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF_NAME" == "staging" ]]; then
            echo "TAG=staging-latest" >> $GITHUB_OUTPUT
          fi

      - name: Build Backend Image
        run: |
          docker build -t moatazbench/pfe-backend:${{ steps.vars.outputs.TAG }} ./backend

      - name: Build Frontend Image
        run: |
          docker build -t moatazbench/pfe-frontend:${{ steps.vars.outputs.TAG }} ./frontend

      # =========================
      # 4️⃣ Trivy Security Scan
      # =========================
      - name: Install Trivy
        run: |
          sudo apt-get install wget -y
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.1_Linux-64bit.deb
          sudo dpkg -i trivy_0.50.1_Linux-64bit.deb

      - name: Scan Backend Image
        run: |
          trivy image --exit-code 1 --severity CRITICAL moatazbench/pfe-backend:${{ steps.vars.outputs.TAG }}

      - name: Scan Frontend Image
        run: |
          trivy image --exit-code 1 --severity CRITICAL moatazbench/pfe-frontend:${{ steps.vars.outputs.TAG }}

      - name: Push Images (Only on Push)
        if: github.event_name == 'push'
        run: |
          docker push moatazbench/pfe-backend:${{ steps.vars.outputs.TAG }}
          docker push moatazbench/pfe-frontend:${{ steps.vars.outputs.TAG }}