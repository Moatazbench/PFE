apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pfe-dev

resources:
  - ../../base

patches:
  - path: backend-patch.yaml
    target:
      kind: Deployment
      name: backend

  - path: frontend-patch.yaml
    target:
      kind: Deployment
      name: frontend

images:
  - name: moatazbench/pfe-backend
    newTag: ac9431a85637e856c2b0f4ae8b89457f21c93f73
  - name: moatazbench/pfe-frontend
    newTag: ac9431a85637e856c2b0f4ae8b89457f21c93f73