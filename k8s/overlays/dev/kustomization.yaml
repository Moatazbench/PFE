apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pfe-dev

resources:
  - ../../base

patches:
  - path: backend-patch.yaml
    target:
      kind: Deployment
      name: backend

  - path: frontend-patch.yaml
    target:
      kind: Deployment
      name: frontend

images:
  - name: moatazbench/pfe-backend
    newTag: 4b94fe9d7237b180fbd415159fc34dfa385ce174
  - name: moatazbench/pfe-frontend
    newTag: 4b94fe9d7237b180fbd415159fc34dfa385ce174