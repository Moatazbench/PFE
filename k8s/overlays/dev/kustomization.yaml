apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pfe-dev

resources:
  - ../../base

patches:
  - path: backend-patch.yaml
    target:
      kind: Deployment
      name: backend

  - path: frontend-patch.yaml
    target:
      kind: Deployment
      name: frontend

images:
  - name: moatazbench/pfe-backend
    newTag: 9ff534575a60edaca4c9786d446b9ab9374207cc
  - name: moatazbench/pfe-frontend
    newTag: 9ff534575a60edaca4c9786d446b9ab9374207cc