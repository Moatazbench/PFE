apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pfe-dev

resources:
  - ../../base

patches:
  - path: backend-patch.yaml
    target:
      kind: Deployment
      name: backend

  - path: frontend-patch.yaml
    target:
      kind: Deployment
      name: frontend

images:
  - name: moatazbench/pfe-backend
    newTag: dcdb16e0c3dfab4ace7adda88fe1be4433daff94
  - name: moatazbench/pfe-frontend
    newTag: dcdb16e0c3dfab4ace7adda88fe1be4433daff94