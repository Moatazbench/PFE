apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pfe-dev

resources:
  - ../../base

patches:
  - path: backend-patch.yaml
    target:
      kind: Deployment
      name: backend

  - path: frontend-patch.yaml
    target:
      kind: Deployment
      name: frontend

images:
  - name: moatazbench/pfe-backend
    newTag: 76b929c0935b27a26d8019e2bf5ee46d130c0809
  - name: moatazbench/pfe-frontend
    newTag: 76b929c0935b27a26d8019e2bf5ee46d130c0809