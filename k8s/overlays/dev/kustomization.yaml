apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pfe-dev

resources:
  - ../../base

patches:
  - path: backend-patch.yaml
    target:
      kind: Deployment
      name: backend

  - path: frontend-patch.yaml
    target:
      kind: Deployment
      name: frontend

images:
  - name: moatazbench/pfe-backend
    newTag: 367e741ac09c6f3f64f57ab4d0caa8ff04fa083e
  - name: moatazbench/pfe-frontend
    newTag: 367e741ac09c6f3f64f57ab4d0caa8ff04fa083e