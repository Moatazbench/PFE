apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pfe-dev

resources:
  - ../../base

patches:
  - path: backend-patch.yaml
    target:
      kind: Deployment
      name: backend

  - path: frontend-patch.yaml
    target:
      kind: Deployment
      name: frontend

images:
  - name: moatazbench/pfe-backend
    newTag: 7dabe3cd2fb138aced915a263445dc5cf230b4df
  - name: moatazbench/pfe-frontend
    newTag: 7dabe3cd2fb138aced915a263445dc5cf230b4df