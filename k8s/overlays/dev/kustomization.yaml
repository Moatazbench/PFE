apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pfe-dev

resources:
  - ../../base

patches:
  - path: backend-patch.yaml
    target:
      kind: Deployment
      name: backend

  - path: frontend-patch.yaml
    target:
      kind: Deployment
      name: frontend

images:
  - name: moatazbench/pfe-backend
    newTag: 0d2e0cae341cbb85171e8d9ebe77ff1c6546693d
  - name: moatazbench/pfe-frontend
    newTag: 0d2e0cae341cbb85171e8d9ebe77ff1c6546693d