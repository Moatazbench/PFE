apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pfe-dev

resources:
  - ../../base

patches:
  - path: backend-patch.yaml
    target:
      kind: Deployment
      name: backend

  - path: frontend-patch.yaml
    target:
      kind: Deployment
      name: frontend

images:
  - name: moatazbench/pfe-backend
    newTag: a949fa5b0817657489e3693cf8f3d310a43a4370
  - name: moatazbench/pfe-frontend
    newTag: a949fa5b0817657489e3693cf8f3d310a43a4370