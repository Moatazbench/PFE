apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pfe-staging

resources:
  - ../../base

patches:
  - path: backend-patch.yaml
    target:
      kind: Deployment
      name: backend

  - path: frontend-patch.yaml
    target:
      kind: Deployment
      name: frontend

images:
  - name: moatazbench/pfe-backend
    newTag: staging-latest
  - name: moatazbench/pfe-frontend
    newTag: staging-latest
